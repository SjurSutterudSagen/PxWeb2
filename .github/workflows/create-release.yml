# This workflow is manually triggered after creating a draft release.
# It builds the project and uploads the artifact to the existing draft release.

name: Create artifact and add to release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to attach assets to (for example v1.2.3)
        required: true
        type: string

concurrency:
  group: create-release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.validate.outputs.tag_name }}
      resolved_ref: ${{ steps.validate.outputs.resolved_ref }}
      version: ${{ steps.validate.outputs.version }}
      major: ${{ steps.validate.outputs.major }}
      major_minor: ${{ steps.validate.outputs.major_minor }}

    env:
      TAG_NAME: ${{ inputs.tag_name }}

    steps:
      - name: Validate tag format and semver
        id: validate
        run: |
          if ! [[ "$TAG_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid tag format: $TAG_NAME"
            echo "Allowed characters: letters, digits, dot, underscore, hyphen."
            exit 1
          fi

          if [[ "$TAG_NAME" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?$ ]]; then
            version="${TAG_NAME#v}"
            major="${BASH_REMATCH[1]}"
            major_minor="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            echo "Tag must be semver-like (for example v1.2.3 or 1.2.3)."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false # Prevents GH CLI from using the token for git operations, ensuring it only uses it for API calls.
      - name: Validate release exists and is draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$TAG_NAME" --json isDraft,targetCommitish >/dev/null; then
            echo "Release $TAG_NAME does not exist."
            exit 1
          fi

          is_draft=$(gh release view "$TAG_NAME" --json isDraft -q '.isDraft')
          target_commitish=$(gh release view "$TAG_NAME" --json targetCommitish -q '.targetCommitish')

          if [ "$is_draft" != "true" ]; then
            echo "Release $TAG_NAME is not a draft. Aborting to keep releases immutable."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            resolved_ref="refs/tags/$TAG_NAME"
          else
            if [ -z "$target_commitish" ] || [ "$target_commitish" = "null" ]; then
              echo "Release $TAG_NAME is missing target_commitish."
              exit 1
            fi
            resolved_ref="$target_commitish"
          fi

          echo "resolved_ref=$resolved_ref" >> "$GITHUB_OUTPUT"

  release_asset:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      resolved_ref: ${{ needs.validate.outputs.resolved_ref }}
      version: ${{ needs.validate.outputs.version }}
      major: ${{ needs.validate.outputs.major }}
      major_minor: ${{ needs.validate.outputs.major_minor }}

    env:
      TAG_NAME: ${{ needs.validate.outputs.tag_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ needs.validate.outputs.resolved_ref }}
          persist-credentials: false # Prevents GH CLI from using the token for git operations, ensuring it only uses it for API calls.
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - run: npm run build-artifact
      - name: Create zip file
        run: pushd packages/pxweb2/dist && zip -r "$OLDPWD/pxweb-$TAG_NAME.zip" ./
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" "pxweb-$TAG_NAME.zip" --clobber

  docker_publish:
    runs-on: ubuntu-latest
    needs: release_asset
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ needs.release_asset.outputs.resolved_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release_asset.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ needs.release_asset.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:${{ needs.release_asset.outputs.major }}
