# This workflow is manually triggered after creating a draft release.
# It builds the project and uploads the artifact to the existing draft release.

name: Create artifact and add to release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to attach assets to (for example v1.2.3)
        required: true
        type: string

concurrency:
  group: create-release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # Needed to see draft releases
    outputs:
      tag_name: ${{ steps.semver.outputs.tag_name }}
      resolved_ref: ${{ steps.release.outputs.resolved_ref }}
      version: ${{ steps.semver.outputs.version }}
      major: ${{ steps.semver.outputs.major }}
      major_minor: ${{ steps.semver.outputs.major_minor }}
      release_tag_name: ${{ steps.release.outputs.release_tag_name }}

    env:
      TAG_NAME: ${{ inputs.tag_name }}

    steps:
      - name: Validate tag format and semver
        id: semver
        run: |
          if ! [[ "$TAG_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid tag format: $TAG_NAME"
            echo "Allowed characters: letters, digits, dot, underscore, hyphen."
            exit 1
          fi

          if [[ "$TAG_NAME" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?$ ]]; then
            version="${TAG_NAME#v}"
            major="${BASH_REMATCH[1]}"
            major_minor="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            echo "Tag must be semver-like (for example v1.2.3 or 1.2.3)."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false # Prevents GH CLI from using the token for git operations, ensuring it only uses it for API calls.
      - name: Validate release exists and is draft
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          print_candidates() {
            jq -r '.[] | "- id=\(.id) tag_name=\(.tag_name // "null") name=\(.name // "") target_commitish=\(.target_commitish // "null")"' <<<"$1"
          }

          draft_releases=$(
            gh api --paginate "/repos/$GH_REPO/releases?per_page=100" |
              jq -s 'map(.[]) | map(select(.draft == true))'
          )

          exact_matches=$(jq --arg tag "$TAG_NAME" '[.[] | select(.tag_name == $tag)]' <<<"$draft_releases")
          exact_count=$(jq 'length' <<<"$exact_matches")

          if [ "$exact_count" -gt 1 ]; then
            echo "Multiple draft releases exactly match tag_name $TAG_NAME. Resolve the ambiguity before rerunning:"
            print_candidates "$exact_matches"
            exit 1
          fi

          if [ "$exact_count" -eq 1 ]; then
            release_json=$(jq '.[0]' <<<"$exact_matches")
          else
            name_matches=$(jq --arg tag "$TAG_NAME" '[.[] | select((.name // "") | contains($tag))]' <<<"$draft_releases")
            name_count=$(jq 'length' <<<"$name_matches")

            if [ "$name_count" -gt 1 ]; then
              echo "Multiple draft releases have names containing $TAG_NAME. Resolve the ambiguity before rerunning:"
              print_candidates "$name_matches"
              exit 1
            fi

            if [ "$name_count" -eq 1 ]; then
              release_json=$(jq '.[0]' <<<"$name_matches")
            else
              echo "No draft release matched $TAG_NAME. Checked draft tag_name first, then draft release name containing the tag."
              exit 1
            fi
          fi

          if git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            resolved_ref="refs/tags/$TAG_NAME"
          else
            target_commitish=$(jq -r '.target_commitish' <<<"$release_json")
            if [ -z "$target_commitish" ] || [ "$target_commitish" = "null" ]; then
              echo "Matched draft release for $TAG_NAME is missing target_commitish."
              exit 1
            fi
            resolved_ref="$target_commitish"
          fi

          release_tag_name=$(jq -r '.tag_name' <<<"$release_json")

          echo "resolved_ref=$resolved_ref" >> "$GITHUB_OUTPUT"
          echo "release_tag_name=$release_tag_name" >> "$GITHUB_OUTPUT"

  release_asset:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      resolved_ref: ${{ needs.validate.outputs.resolved_ref }}
      version: ${{ needs.validate.outputs.version }}
      major: ${{ needs.validate.outputs.major }}
      major_minor: ${{ needs.validate.outputs.major_minor }}

    env:
      TAG_NAME: ${{ needs.validate.outputs.tag_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ needs.validate.outputs.resolved_ref }}
          persist-credentials: false # Prevents GH CLI from using the token for git operations, ensuring it only uses it for API calls.
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - run: npm run build-artifact
      - name: Create zip file
        run: pushd packages/pxweb2/dist && zip -r "$OLDPWD/pxweb-$TAG_NAME.zip" ./
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_NAME: ${{ needs.validate.outputs.release_tag_name }}
        run: |
          gh release upload "$RELEASE_TAG_NAME" "pxweb-$TAG_NAME.zip" --clobber

  docker_publish:
    runs-on: ubuntu-latest
    needs: release_asset
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: ${{ needs.release_asset.outputs.resolved_ref }}
          persist-credentials: false # Prevents the token from being used for git operations in this job.

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Normalize image name
        id: image_name
        run: echo "repository=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.image_name.outputs.repository }}:${{ needs.release_asset.outputs.version }}
            ghcr.io/${{ steps.image_name.outputs.repository }}:${{ needs.release_asset.outputs.major_minor }}
            ghcr.io/${{ steps.image_name.outputs.repository }}:${{ needs.release_asset.outputs.major }}
