# This workflow is manually triggered after creating a draft release.
# It builds the project and uploads the artifact to the existing draft release.

name: Create artifact and add to release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to attach assets to (for example v1.2.3)
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: create-release-${{ inputs.tag_name }}
      cancel-in-progress: false
    permissions:
      contents: write

    env:
      TAG_NAME: ${{ inputs.tag_name }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false # Prevents GH CLI from using the token for git operations, ensuring it only uses it for API calls.
      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Validate tag format
        run: |
          if ! [[ "$TAG_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid tag format: $TAG_NAME"
            echo "Allowed characters: letters, digits, dot, underscore, hyphen."
            exit 1
          fi
      - run: npm ci
      - run: npm run build-artifact
      - name: Validate draft release exists for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          is_draft=$(gh release view "$TAG_NAME" --json isDraft -q '.isDraft')

          if [ "$is_draft" != "true" ]; then
            echo "Release $TAG_NAME is not a draft. Aborting to keep releases immutable."
            exit 1
          fi
      - name: Create zip file
        run: pushd packages/pxweb2/dist && zip -r "$OLDPWD/pxweb-$TAG_NAME.zip" ./
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" "pxweb-$TAG_NAME.zip"
